version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: montage_ai_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: montage_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: montage_ai_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
